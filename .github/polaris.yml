name: CI-Polaris 
on:
  push:
    branches: [ main, master, develop, stage, release, SIGINT-4621]
  pull_request:
    branches: [ main, master, develop, stage, release, SIGINT-4621]  
jobs:
  polaris-scan:
    runs-on: [ self-hosted ]
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3
      - name: Polaris Full Scan
        if: ${{ github.event_name != 'pull_request' }}
        uses: blackduck-inc/black-duck-security-scan@SIGINT-4621
        with:
          polaris_server_url: ${{ vars.POLARIS_SERVER_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_application_name: ${{ github.event.repository.name }}
          #polaris_project_name: ${{ github.event.repository.name }}
          polaris_assessment_types: "SCA,SAST"
          #bridgecli_download_url: "https://artifactory.tools.duckutil.net/artifactory/clops-local/integrations/bridge/binaries/bridge-cli-bundle/3.9.0rc1/bridge-cli-bundle-3.9.0rc1-macos_arm.zip"
          #bridgecli_download_url: "https://artifactory.tools.duckutil.net/artifactory/clops-local/integrations/bridge/binaries/bridge-cli-bundle/4.0.0rc3/bridge-cli-bundle-4.0.0rc3-macos_arm.zip"
          #polaris_assessment_mode: "SOURCE_UPLOAD"
          bridgecli_download_url: "https://artifactory.tools.duckutil.net/artifactory/clops-local/integrations/bridge/binaries/bridge-cli-bundle/3.9.0rc1/bridge-cli-bundle-3.9.0rc1-macos_arm.zip"
          polaris_test_sca_location: "hybrid"
          #polaris_test_sca_type: 'SCA-SIGNATURE'
          #polaris_test_sast_type: "SAST_FULL"
          polaris_externalIssues_create: true
          polaris_externalIssues_types: "SCA,SAST"
          polaris_externalIssues_severities: "critical,high,medium"
          #polaris_externalIssues_groupSCAIssues: true
          polaris_externalIssues_maxCount: 6
          polaris_fixpr_enabled: true
          polaris_fixpr_maxCount: 5
          polaris_fixpr_useUpgradeGuidance: "SHORT_TERM,LONG_TERM"
          polaris_fixpr_filter_by: "SEVERITIES"
          polaris_fixpr_filter_severities: "CRITICAL,HIGH"
          github_token: ${{ secrets.TOKEN1 }}
          #polaris_waitforscan: false
