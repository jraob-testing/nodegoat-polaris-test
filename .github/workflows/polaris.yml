name: Polaris FixPR Test
on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  polaris-scan:
    runs-on: self-hosted
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Polaris Scan with FixPR
        uses: blackduck-inc/black-duck-security-scan@SIGINT-4621
        with:
            # Polaris Configuration
          polaris_server_url: ${{ vars.POLARIS_SERVER_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_application_name: "nodegoat-test"
          polaris_project_name: "nodegoat-test-project"
          polaris_assessment_types: "SAST,SCA"

          bridgecli_download_url: "https://artifactory.tools.duckutil.net/artifactory/clops-local/integrations/bridge/binaries/bridge-cli-bundle/4.1.0rc3/bridge-cli-bundle-4.1.0rc3-macosx.zip"
# Polaris Fix PR - YOUR NEW FEATURE
          # polaris_waitForScan: true
          polaris_fixpr_enabled: true
          # polaris_fixpr_maxCount: 5
          # polaris_fixpr_useUpgradeGuidance: "SHORT_TERM"
          polaris_fixpr_filter_by: "SEVERITIES"
          polaris_fixpr_filter_severities: "CRITICAL"
          polaris_test_sast_location: "Remote"
          polaris_test_sca_location: "Remote"

            # GitHub Configuration
          github_token: ${{ secrets.TOKEN1 }}
          github_owner_name: "jraob-testing"
          github_repository_name: "nodegoat-polaris-test"
          github_repository_branch_name: "main"

            # Diagnostics
          include_diagnostics: true

  